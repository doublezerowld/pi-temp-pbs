<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='style.css') }}"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="icon"
            type="image/x-icon"
            href="{{ url_for('static', filename='favicon.png') }}"
        />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
        <script>
            window.chartData = {{ t_data | tojson | safe }};
        </script>
        <title>Czujnik Temperatury</title>
    </head>
    <body>
        <header class="page-margin">
            <img
                src="{{ url_for('static', filename='logo.png') }}"
                alt="Logo PBS"
            />
        </header>
        <main>
            <section id="container">
                <h1>{{ temp2f }} °C</h1>
                <p>Ostatnia aktualizacja: {{ last_update }}</p>
                <button id="chart-toggle" class="fade-in" type="button">
                    Ukryj wykres
                </button>
                <div id="chart-div">
                    <canvas id="temperature-chart"></canvas>
                </div>
                <script src="{{ url_for('static', filename='main.js') }}"></script>
            </section>
        </main>
        <footer class="page-margin">
            <div id="footer-elements" class="fade-in">
                <p id="footer-text">© Jan Bartkowski</p>
                <a href="https://github.com/OrdinarySoftwareDev">
                    <img
                        src="{{ url_for('static', filename='GitHub_Invertocat_Black_Clearspace.svg') }}"
                        title="@OrdinarySoftwareDev"
                        alt="@OrdinarySoftwareDev"
                        id="invertocat"
                    />
                </a>
            </div>
        </footer>
    </body>
</html>
